<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SBS 기자 출입처 모니터링 페이지</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #fafafa;
    margin: 20px;
  }
  .section {
    margin-bottom: 30px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 10px;
    background-color: #fff;
  }
  .section-title {
    font-size: 1.2em;
    font-weight: bold;
    margin-bottom: 8px;
    color: #333;
  }
  iframe {
    width: 100%;
    height: 100px;
    border: 1px solid #ddd;
    border-radius: 6px;
  }
  hr {
    border: 0;
    border-top: 2px solid #eee;
    margin: 20px 0;
  }
</style>
</head>
<body>

<h1>SBS 기자 출입처 실시간 오디오 모니터링</h1>
<div id="container"></div>

<script>
const l_iframe = [
  { title: "고검", url: "http://10.10.107.109:8889/alsa10" },
  { title: "국회", url: "http://10.10.107.109:8889/alsa11" },
  { title: "국방부", url: "http://10.10.107.109:8889/alsa00" },
  { title: "외통부", url: "http://10.10.107.109:8889/alsa01" }
];

const container = document.getElementById('container');

l_iframe.forEach((item, index) => {
  const section = document.createElement('div');
  section.className = 'section';

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = item.title;

  const iframe = document.createElement('iframe');
  iframe.src = item.url;
  iframe.loading = 'lazy';

  section.appendChild(title);
  section.appendChild(iframe);
  container.appendChild(section);

  // 구분선 추가 (마지막 항목 제외)
  if (index < l_iframe.length - 1) {
    const hr = document.createElement('hr');
    container.appendChild(hr);
  }
});
</script>

<hr>
<div>
<h3>Created by SBS media IT, sendust (sendust@sbs.co.kr) </h3>
</div>
</body>
</html>
